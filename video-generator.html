<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양구온길 - 5초 시네마틱 영상 메이커</title>
    <meta name="description" content="양구군 맛집 및 숙소 대표 이미지를 5초짜리 이어지는 고화질 시네마틱 영상으로 제작하고 내보냅니다.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="video-generator">

    <div class="app-container">
        <!-- 공통 헤더 들어갈 자리 -->
        <div id="header-placeholder"></div>

        <div class="app-content">
            <h1 style="font-size: 1.45rem; font-weight: 800; color: var(--primary); margin-top: 10px; margin-bottom: 8px;">🎬 5초 영상 메이커</h1>
            <p style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 20px;">
                대표 이미지에 카메라 무빙을 입혀 인스타그램 릴스나 카카오톡 공유용 5초 홍보 영상을 만듭니다.
            </p>

            <div class="generator-container">
                
                <!-- 왼쪽: 폰 시뮬레이터 프리뷰 -->
                <div>
                    <div class="phone-frame-wrapper">
                        <div class="phone-screen">
                            <div class="canvas-preview-container">
                                <canvas id="generator-canvas" width="540" height="960"></canvas>
                                <!-- 워터마크 또는 정보 표시 -->
                                <div style="position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.7); font-size: 0.82rem; z-index: 10; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,0.6); pointer-events: none;">
                                    양구온길. 🎬 5s Loop
                                </div>
                            </div>
                        </div>
                    </div>
                    <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 12px;">
                        💡 프리뷰 화면은 실제 비디오 워킹을 미리 보여줍니다.
                    </p>
                </div>

                <!-- 오른쪽: 제어판 -->
                <div>
                    <div class="card" style="padding: 20px; margin-bottom: 16px;">
                        <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            <i data-lucide="image" style="width: 18px; height: 18px;"></i> 1. 이미지 선택하기
                        </h3>
                        
                        <!-- 8대 맛집/숙박 프리셋 이미지 그리드 -->
                        <div class="preset-grid" id="preset-images-grid">
                            <!-- JS에서 동적 주입 -->
                        </div>

                        <!-- 파일 직접 업로드 -->
                        <div class="custom-uploader" id="upload-trigger">
                            <i data-lucide="upload-cloud" style="width: 28px; height: 28px; display: block; margin: 0 auto 6px auto;"></i>
                            <span>내 갤러리에서 사진 올리기</span>
                            <input type="file" id="image-uploader" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="card" style="padding: 20px; margin-bottom: 16px;">
                        <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                            <i data-lucide="video" style="width: 18px; height: 18px;"></i> 2. 카메라 효과 (모션)
                        </h3>
                        
                        <div class="motion-select-container">
                            <button class="motion-btn active" data-motion="zoomIn">
                                🔍 줌인 (Zoom In)
                            </button>
                            <button class="motion-btn" data-motion="panRight">
                                ➡️ 우측 패닝
                            </button>
                            <button class="motion-btn" data-motion="dissolve">
                                🌸 감성 디졸브
                            </button>
                        </div>
                    </div>

                    <div class="card" style="padding: 20px; border: 2px solid var(--primary-light);">
                        <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 8px;">
                            3. 5초 비디오 내보내기
                        </h3>
                        <p style="font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.4;">
                            아래 버튼을 누르면 5초간 실시간 드로잉 렌더링이 시작되며, 끝나는 즉시 WebM 고화질 연속 재생 비디오 파일이 자동으로 컴퓨터/스마트폰에 다운로드됩니다.
                        </p>

                        <button id="btn-render-video" class="btn btn-primary" style="padding: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
                            <i data-lucide="film"></i> 5초 고화질 영상 만들기 (다운로드)
                        </button>

                        <!-- 프로그레스 바 -->
                        <div class="progress-container" id="render-progress-container">
                            <div class="progress-bar" id="render-progress-bar"></div>
                        </div>
                        <div class="progress-text" id="render-progress-text">영상을 만드는 중... 0%</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 공통 하단 바 들어갈 자리 -->
        <div id="nav-placeholder"></div>
    </div>

    <!-- 스크립트 로드 -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
