<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양구온길 - 주변 상점 정보 디렉토리</title>
    <meta name="description" content="양구군 신병교육대 인근 군인 우대 숙소, 한우/돼지갈비 고깃집, 시래기 맛집 및 전경이 예쁜 루프탑 카페 목록 안내">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="directory">

    <div class="app-container">
        <!-- 공통 헤더 들어갈 자리 -->
        <div id="header-placeholder"></div>

        <div class="app-content">
            <h1 style="font-size: 1.45rem; font-weight: 800; color: var(--primary); margin-top: 10px; margin-bottom: 8px;">주변 편의시설 찾기</h1>
            <p style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 20px;">신교대 근처 차량 15분 이내의 검증된 펜션, 맛집, 카페입니다.</p>

            <!-- 검색 및 정렬 바 -->
            <div class="search-sort-container" style="display: flex; gap: 8px; margin-bottom: 16px;">
                <div class="search-box" style="flex: 1; margin-bottom: 0;">
                    <i data-lucide="search" class="search-icon" style="width: 20px; height: 20px;"></i>
                    <input type="text" id="shop-search-input" class="form-control" placeholder="상호명, 키워드(예: 한우, 독채) 검색...">
                </div>
                <select id="shop-sort-select" class="form-control" style="width: 120px; font-size: 0.9rem; padding: 0 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background-color: var(--card-bg); color: var(--text-main);">
                    <option value="default">추천순</option>
                    <option value="rating">★ 별점순</option>
                    <option value="distance">📍 거리순</option>
                </select>
            </div>

            <!-- 카테고리 탭 -->
            <div class="tab-container" id="tab-container" style="overflow-x: auto; white-space: nowrap; padding-bottom: 4px; display: flex; gap: 6px;">
                <button class="tab-btn active" data-category="all" style="flex-shrink: 0;">전체보기</button>
                <button class="tab-btn" data-category="lodging" style="flex-shrink: 0;">🏡 숙박/펜션</button>
                <button class="tab-btn" data-category="restaurant" style="flex-shrink: 0;">🍖 식당/맛집</button>
                <button class="tab-btn" data-category="cafe" style="flex-shrink: 0;">☕ 카페/디저트</button>
                <button class="tab-btn" data-category="bookmarked" style="color: var(--accent); flex-shrink: 0;"><i data-lucide="heart" style="width:12px; height:12px; fill:var(--accent); display:inline-block; vertical-align: middle; margin-right: 2px;"></i> 저장한 곳</button>
            </div>


            <!-- 미니 레이더 거리 위젯 -->
            <div class="radar-widget-container" id="radar-widget-container" style="margin-top: 10px;">
                <h3 style="font-size: 1.15rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 4px;">
                    <i data-lucide="compass" style="width: 18px; height: 18px;"></i> 신교대 기준 반경 거리 위젯
                </h3>
                <p style="font-size: 0.88rem; color: var(--text-muted); margin-bottom: 10px;">신병교육대(중앙 붉은 점) 기준 차량/도보 거리 분포도</p>
                <div class="radar-scope" id="radar-scope">
                    <div class="radar-sweep"></div>
                    <div class="radar-circle radar-circle-1"></div>
                    <div class="radar-circle radar-circle-2"></div>
                    <div class="radar-circle radar-circle-3"></div>
                    <div class="radar-axis-h"></div>
                    <div class="radar-axis-v"></div>
                    <div class="radar-center" title="21사단 신교대"></div>
                    <!-- 레이더 마커들이 JS로 주입됨 -->
                    <div id="radar-markers-container"></div>
                </div>
                <div style="display: flex; justify-content: center; gap: 12px; font-size: 0.8rem; color: var(--text-muted); margin-top: 6px;">
                    <span>🟢 5분 이내 (안쪽 원)</span>
                    <span>🟡 10분 이내 (중간 원)</span>
                    <span>🔴 15분 이내 (바깥 원)</span>
                </div>
            </div>

            <!-- 상점 카드 목록 출력 (반응형 그리드) -->
            <div id="shop-list-container" class="grid-2">
                <!-- JS에서 동적 주입 -->
            </div>
        </div>

        <!-- 공통 하단 바 들어갈 자리 -->
        <div id="nav-placeholder"></div>
    </div>

    <!-- 스크립트 로드 -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
