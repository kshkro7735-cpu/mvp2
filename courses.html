<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양구온길 - 맞춤 추천 코스 찾기</title>
    <meta name="description" content="방문 목적과 선호 사항을 선택하여 양구군 면회 당일 최적의 일정을 1분 안에 추천받으세요.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="courses">

    <div class="app-container">
        <!-- 공통 헤더 들어갈 자리 -->
        <div id="header-placeholder"></div>

        <div class="app-content">
            <h1 class="text-center" style="margin-top: 10px; margin-bottom: 20px; font-size: 1.55rem; color: var(--primary);">
                <i data-lucide="route" style="vertical-align: middle; margin-right: 4px;"></i> 면회 코스 플래너
            </h1>

            <div class="card max-width-md" style="padding: 24px 20px;">
                <!-- 질문 1단계: 동반자 -->
                <div id="step-companion" class="q-step active">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <span style="font-size: 0.95rem; font-weight: 700; color: var(--primary); background-color: var(--primary-light); padding: 4px 10px; border-radius: 20px;">질문 1 / 3</span>
                    </div>
                    <h2 style="font-size: 1.35rem; line-height: 1.45; margin-bottom: 24px; color: var(--text-main);">양구 면회에<br>누구와 함께 오시나요?</h2>
                    
                    <div>
                        <button class="option-btn" data-step="companion" data-value="parents">
                            <span>부모님 단둘이 (또는 혼자)</span>
                            <div class="icon"></div>
                        </button>
                        <button class="option-btn" data-step="companion" data-value="family">
                            <span>형제/자매를 포함한 온 가족</span>
                            <div class="icon"></div>
                        </button>
                        <button class="option-btn" data-step="companion" data-value="girlfriend">
                            <span>장병의 연인 또는 친구들</span>
                            <div class="icon"></div>
                        </button>
                    </div>
                </div>

                <!-- 질문 2단계: 선호 스타일 -->
                <div id="step-preference" class="q-step">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <span style="font-size: 0.95rem; font-weight: 700; color: var(--primary); background-color: var(--primary-light); padding: 4px 10px; border-radius: 20px;">질문 2 / 3</span>
                        <button class="btn-prev" style="background: none; border: none; font-size: 0.95rem; font-weight: 700; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 4px;">
                            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> 이전으로
                        </button>
                    </div>
                    <h2 style="font-size: 1.35rem; line-height: 1.45; margin-bottom: 24px; color: var(--text-main);">면회 시간 동안<br>어떤 활동을 선호하시나요?</h2>
                    
                    <div>
                        <button class="option-btn" data-step="preference" data-value="healing">
                            <span>편안하게 한식 먹고 쉬는 힐링</span>
                            <div class="icon"></div>
                        </button>
                        <button class="option-btn" data-step="preference" data-value="eating">
                            <span>아들이 먹고 싶어 하는 고기/맛집 탐방</span>
                            <div class="icon"></div>
                        </button>
                        <button class="option-btn" data-step="preference" data-value="scenic">
                            <span>파로호 산책과 인생 사진 촬영</span>
                            <div class="icon"></div>
                        </button>
                    </div>
                </div>

                <!-- 질문 3단계: 이동 수단 -->
                <div id="step-transport" class="q-step">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <span style="font-size: 0.95rem; font-weight: 700; color: var(--primary); background-color: var(--primary-light); padding: 4px 10px; border-radius: 20px;">질문 3 / 3</span>
                        <button class="btn-prev" style="background: none; border: none; font-size: 0.95rem; font-weight: 700; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 4px;">
                            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> 이전으로
                        </button>
                    </div>
                    <h2 style="font-size: 1.35rem; line-height: 1.45; margin-bottom: 24px; color: var(--text-main);">양구 내에서의<br>이동 방법은 어떻게 되시나요?</h2>
                    
                    <div>
                        <button class="option-btn" data-step="transport" data-value="car">
                            <span>자가용 (자차 운전)</span>
                            <div class="icon"></div>
                        </button>
                        <button class="option-btn" data-step="transport" data-value="taxi">
                            <span>대중교통 (시외버스 + 택시)</span>
                            <div class="icon"></div>
                        </button>
                    </div>
                </div>

                <!-- 결과 분석 중 상태 -->
                <div id="step-result-calculating" class="q-step text-center" style="padding: 40px 10px;">
                    <div style="display: inline-block; margin-bottom: 20px; width: 50px; height: 50px; border: 5px solid var(--primary-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear;"></div>
                    <h2 style="font-size: 1.3rem; margin-bottom: 10px; color: var(--text-main);">아들에게 최적화된 일정을 찾는 중...</h2>
                    <p style="font-size: 0.98rem; color: var(--text-muted);">부모님과 장병의 이동 동선을 고려하고 있습니다.</p>
                    <style>
                        @keyframes spin { to { transform: rotate(360deg); } }
                    </style>
                </div>

                <!-- 매칭 완료 결과 안내 -->
                <div id="step-result-ready" class="q-step">
                    <div class="text-center" style="margin-bottom: 24px;">
                        <div style="background-color: var(--primary-light); width: 60px; height: 60px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px;">
                            <i data-lucide="sparkles" style="color: var(--primary); width: 30px; height: 30px;"></i>
                        </div>
                        <h2 style="font-size: 1.45rem; color: var(--primary); font-weight: 800; justify-content: center; margin-bottom: 6px;">맞춤 코스 분석 완료!</h2>
                        <p style="font-size: 0.95rem; color: var(--text-muted);">아래 코스로 방문하시면 최고의 하루가 됩니다.</p>
                    </div>

                    <!-- 결과 요약 카드 -->
                    <div style="background-color: var(--bg-app); border: 2px solid var(--primary); border-radius: var(--radius-md); padding: 18px; margin-bottom: 20px;">
                        <span id="res-duration" class="badge badge-distance" style="font-size: 0.8rem; background-color: var(--primary); color: #fff; margin-bottom: 10px;">소요 시간</span>
                        <h3 id="res-title" style="font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 8px;">코스 명칭</h3>
                        <p id="res-summary" style="font-size: 1rem; color: var(--text-main); line-height: 1.5; margin-bottom: 12px;">코스 소개 문구</p>
                        <p id="res-target" style="font-size: 0.95rem; font-weight: 600; color: var(--text-muted); margin-bottom: 12px;">추천 대상 정보</p>
                        
                        <div style="border-top: 1px solid var(--border); padding-top: 12px;">
                            <p style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px;">📍 이동 경로 한눈에 보기</p>
                            <div id="res-path-container" style="display: flex; flex-wrap: wrap; gap: 4px;">
                                <!-- 동적 주입 -->
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <a id="res-detail-btn" href="course-detail.html" class="btn btn-primary">
                            <i data-lucide="route"></i> 상세 코스 및 시간표 확인하기
                        </a>
                        <a href="courses.html" class="btn btn-outline">
                            <i data-lucide="refresh-cw"></i> 처음부터 다시 계획하기
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 공통 하단 바 들어갈 자리 -->
        <div id="nav-placeholder"></div>
    </div>

    <!-- 스크립트 로드 -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
